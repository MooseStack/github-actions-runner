name: Traditional Runner Image Build (Using Docker on GitHub-hosted Runners)
# on:
#   push:
#     branches:
#       - main
#     paths:
#       - 'container_image/Containerfile'
#       - 'container_image/Containerfile.traditional'
#       - 'container_image/etc-containers-storage.conf'
#       - 'container_image/entrypoint.sh'
#       - 'container_image/get_github_app_token.sh'
#       - 'container_image/register.sh'
#       - .github/workflows/traditional-image-docker.yaml
on: workflow_dispatch

permissions:
  contents: read

env:
  IMAGE_NAME: moosestack/github-actions-runner

jobs:
  build:
    name: Traditional Runner Image Build (GitHub-hosted Docker)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Get Runner version
      id: runner-version
      run: |
        version=$(grep -oP '^ARG RUNNER_VERSION=\K.*' container_image/Containerfile)-$(date +%s)
        echo "runner_version=$version" >> "$GITHUB_OUTPUT"

    - name: Build base image
      id: build-base
      uses: docker/build-push-action@v7
      with:
        context: ./container_image
        file: ./container_image/Containerfile
        tags: localhost/runner-base:latest
        load: true

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        registry: docker.io
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}

    - name: Build and push Traditional image
      id: build-image
      uses: docker/build-push-action@v7
      with:
        context: ./container_image
        file: ./container_image/Containerfile.traditional
        tags: |
          ${{ env.IMAGE_NAME }}:ubi9-traditional-runner-latest
          ${{ env.IMAGE_NAME }}:ubi9-traditional-runner-v${{ steps.runner-version.outputs.runner_version }}
        build-args: |
          BASE_IMAGE=localhost/runner-base:latest
        push: true

    - name: Print image url
      run: echo "Image pushed to ${{ env.IMAGE_NAME }}:ubi9-traditional-runner-latest and ${{ env.IMAGE_NAME }}:ubi9-traditional-runner-v${{ steps.runner-version.outputs.runner_version }}"