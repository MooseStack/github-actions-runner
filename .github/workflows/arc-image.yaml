name: ARC Runner Image Build
# on:
#   push:
#     branches:
#       - main
#     paths:
#       - 'container_image/Containerfile'
#       - 'container_image/Containerfile.arc'
#       - 'container_image/etc-containers-storage.conf'
#       - .github/workflows/arc-image.yaml
on: workflow_dispatch

permissions:
  contents: read

env:
  IMAGE_NAME: your-org/github-self-hosted-runner

jobs:
  build:
    name: ARC Runner Image Build
    runs-on: [self-hosted]

    steps:
    - uses: actions/checkout@v6

    - name: Get Runner version
      id: runner-version
      run: |
        version=$(grep -oP '^ARG RUNNER_VERSION=\K.*' container_image/Containerfile)-$(date +%s); \
        echo "runner_version=$version" >> "$GITHUB_OUTPUT"

    - name: Build base image
      id: build-base
      uses: redhat-actions/buildah-build@v2
      with:
        image: runner-base
        tags: latest
        containerfiles: |
          ./container_image/Containerfile
        context: ./container_image

    - name: Build ARC image
      id: build-image
      uses: redhat-actions/buildah-build@v2
      with:
        image: ${{ env.IMAGE_NAME }}
        tags: ubi9-arc-runner-latest ubi9-arc-runner-v${{steps.runner-version.outputs.runner_version}}
        build-args: |
          BASE_IMAGE=localhost/runner-base:latest
        containerfiles: |
          ./container_image/Containerfile.arc
        context: ./container_image

    - name: Push to registry
      id: push-to-quay
      uses: redhat-actions/push-to-registry@v2
      with:
        image: ${{ steps.build-image.outputs.image }}
        tags: ${{ steps.build-image.outputs.tags }}
        registry: your-registry.example.com
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}

    - name: Print image url
      run: echo "Image pushed to ${{ steps.push-to-quay.outputs.registry-paths }}"
