{{/*
  ServiceAccount + RoleBinding for the runner pods.

  Binds the runner service account to the built-in
  anyuid SCC so containers can run as any UID.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "arc-openshift.runnerServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arc-openshift.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "arc-openshift.fullname" . }}-runner-scc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arc-openshift.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "system:openshift:scc:anyuid"
subjects:
  ## Runner pods service account
  - kind: ServiceAccount
    name: {{ include "arc-openshift.runnerServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
